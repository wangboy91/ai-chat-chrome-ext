<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI &#39029;&#38754;&#21161;&#25163;</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="sidepanel-shell">
    <header class="panel-header">
      <div class="panel-title">
        <h1 id="sessionTitle">&#26032;&#23545;&#35805;</h1>
        <p id="pageInfo">&#31561;&#24453;&#35835;&#21462;&#24403;&#21069;&#39029;&#38754;</p>
      </div>
      <div class="header-actions">
        <button id="newSession" class="icon-button" type="button" title="&#26032;&#24314;&#23545;&#35805;">N</button>
        <button id="toggleHistory" class="icon-button" type="button" title="&#26597;&#30475;&#21382;&#21490;&#23545;&#35805;">...</button>
        <button id="refreshPage" class="icon-button" type="button" title="&#37325;&#26032;&#35835;&#21462;&#39029;&#38754;">R</button>
      </div>
    </header>

    <aside id="historyMenu" class="history-menu" hidden>
      <div id="historyTitle" class="history-section-title">&#36817;&#26399;&#23545;&#35805;</div>
      <div id="sessionList" class="session-list"></div>
      <button id="deleteSession" class="history-action" type="button">&#21024;&#38500;&#24403;&#21069;&#23545;&#35805;</button>
      <button id="openSettings" class="history-action" type="button">&#35774;&#32622;&#21644;&#27169;&#22411;</button>
    </aside>

    <section class="context-bar" aria-label="Page memory">
      <span id="memoryStatus">&#35760;&#24518;: 0 &#39029;</span>
      <button id="rememberCurrent" class="tiny-button" type="button">&#28155;&#21152;&#24403;&#21069;&#39029;</button>

      <button id="clearMemory" class="tiny-button" type="button">&#28165;&#31354;</button>
    </section>

    <main id="messages" class="messages" aria-live="polite"></main>

    <form id="askForm" class="ask-form compact">
      <div id="attachmentTray" class="attachment-tray" hidden></div>
      <div class="composer-row">
        <button id="uploadImage" class="tool-button" type="button" title="&#19978;&#20256;&#22270;&#29255;" hidden>+</button>
        <textarea id="prompt" rows="1" placeholder="&#36755;&#20837;&#38382;&#39064;"></textarea>
        <button id="askButton" class="send-button" type="submit" title="&#21457;&#36865;">&#21457;&#36865;</button>
      </div>
      <input id="imageInput" type="file" accept="image/*" multiple hidden>
    </form>

    <script src="sidepanel.js"></script>
  </body>
</html>
